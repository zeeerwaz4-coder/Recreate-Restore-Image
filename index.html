<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recreate and Restore</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="top-bar">
    <div class="logo">RR</div>
    <h1>Recreate and Restore</h1>
  </header>

  <!-- MAIN APP LAYOUT -->
  <div class="app">

    <!-- ================= CANVAS AREA (LEFT / CENTER) ================= -->
    <div class="canvas-area">

      <div class="upload-box">

        <input type="file" id="imageUpload" multiple>

        <canvas id="canvas"></canvas>

      </div>

      <textarea
        class="ai-request"
        id="aiRequest"
        placeholder="Describe what the AI should recreate or restore...">
      </textarea>

    </div>

    <!-- ================= TOOLS PANEL (RIGHT SIDE) ================= -->
    <div class="tools-panel">

      <!-- STICKERS -->
      <select id="stickerSelect">
        <option>🔥</option>
        <option>✨</option>
        <option>❤️</option>
        <option>😎</option>
        <option>🌟</option>
        <option>👑</option>
      </select>

      <!-- TEXT -->
      <input type="text" id="textInput" placeholder="Enter text">
      <button onclick="addText()">Add Text</button>

      <!-- SIZE -->
      <label>Object Size</label>
      <input type="range" min="20" max="100" value="40"
        oninput="resizeObject(this.value)">

      <!-- ROTATE -->
      <label>Rotate</label>
      <input type="range" min="-180" max="180" value="0"
        oninput="rotateObject(this.value)">

      <!-- LAYER CONTROLS -->
      <button onclick="deleteSelected()">Delete</button>
      <button onclick="bringFront()">Bring Front</button>
      <button onclick="sendBack()">Send Back</button>

      <!-- STICKERS -->
      <button onclick="addSticker()">Add Sticker</button>

      <!-- EFFECTS -->
      <button onclick="instaColor()">Insta Color</button>
      <button onclick="addFrame()">Frame</button>
      <button onclick="resetImage()">Reset</button>

      <label>Brightness</label>
      <input type="range" min="0.5" max="2" step="0.1"
        value="1" oninput="setBrightness(this.value)">

      <button onclick="vintage()">Vintage</button>
      <button onclick="blurImg()">Blur</button>
      <button onclick="sharpen()">Sharpen</button>
      <button onclick="removeBackground()">AI Background</button>
      <button onclick="enhanceImage()">AI Enhance</button>

      <!-- HISTORY -->
      <button onclick="undoAction()">Undo</button>
      <button onclick="redoAction()">Redo</button>

      <!-- EXPORT -->
      <button onclick="exportHD()">Export HD</button>

      <!-- CROP -->
      <button onclick="activateCrop()">Crop Mode</button>
      <button onclick="applyCrop()">Apply Crop</button>
      <button onclick="cancelCrop()">Cancel Crop</button>

    </div>

  </div>

  <!-- FLOATING AI -->
  <div class="ai-assistant" id="aiAssistant">
    🤖 AI Assistant
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    AI Processing...
  </div>

  <script src="script.js"></script>

  </body>
        </html>
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Restoration Hub</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  overflow-x: hidden;
}

.header {
  text-align: center;
  padding: 12px;
  background: #1c1c1c;
  font-size: 18px;
  font-weight: bold;
}

.preview {
  width: 90%;
  max-width: 320px;
  height: 320px;
  margin: 15px auto;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  overflow: hidden;
}

.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.upload {
  text-align: center;
  margin: 10px;
}

.tools {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  overflow-x: auto;
  background: #000;
  padding: 8px;
  gap: 8px;
}

.tools button {
  flex: 0 0 auto;
  padding: 10px 12px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
}

.tools button:active {
  background: #555;
}
</style>
</head>

<body>

<div class="header">AI Restoration Hub</div>

<div class="upload">
  <input type="file" accept="image/*" onchange="loadImage(event)">
</div>

<div class="preview">
  <img id="imgPreview">
</div>

<div class="tools">
  <button onclick="runTool('beauty')">Beauty</button>
  <button onclick="runTool('rejuvenate')">Rejuvenate</button>
  <button onclick="runTool('brighten')">Brighten</button>
  <button onclick="runTool('restore')">Restore</button>
</div>

<script>
function loadImage(event) {
  const img = document.getElementById('imgPreview');
  img.src = URL.createObjectURL(event.target.files[0]);
}

function runTool(type) {
  const img = document.getElementById('imgPreview');

  if (!img.src) {
    alert("Upload image first");
    return;
  }

  // Placeholder logic (Level 3 will replace with real AI)
  switch(type) {
    case "beauty":
      img.style.filter = "contrast(1.1) saturate(1.2)";
      break;

    case "rejuvenate":
      img.style.filter = "brightness(1.1) blur(0.3px)";
      break;

    case "brighten":
      img.style.filter = "brightness(1.4)";
      break;

    case "restore":
      img.style.filter = "contrast(1.2) saturate(1.1)";
      break;
  }
}
</script>

</body>
  </html>
