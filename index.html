<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recreate and Restore</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="top-bar">
    <div class="logo">RR</div>
    <h1>Recreate and Restore</h1>
  </header>

  <!-- MAIN APP LAYOUT -->
  <div class="app">

    <!-- ================= CANVAS AREA (LEFT / CENTER) ================= -->
    <div class="canvas-area">

      <div class="upload-box">

        <input type="file" id="imageUpload" multiple>

        <canvas id="canvas"></canvas>

      </div>

      <textarea
        class="ai-request"
        id="aiRequest"
        placeholder="Describe what the AI should recreate or restore...">
      </textarea>

    </div>

    <!-- ================= TOOLS PANEL (RIGHT SIDE) ================= -->
    <div class="tools-panel">

      <!-- STICKERS -->
      <select id="stickerSelect">
        <option>🔥</option>
        <option>✨</option>
        <option>❤️</option>
        <option>😎</option>
        <option>🌟</option>
        <option>👑</option>
      </select>

      <!-- TEXT -->
      <input type="text" id="textInput" placeholder="Enter text">
      <button onclick="addText()">Add Text</button>

      <!-- SIZE -->
      <label>Object Size</label>
      <input type="range" min="20" max="100" value="40"
        oninput="resizeObject(this.value)">

      <!-- ROTATE -->
      <label>Rotate</label>
      <input type="range" min="-180" max="180" value="0"
        oninput="rotateObject(this.value)">

      <!-- LAYER CONTROLS -->
      <button onclick="deleteSelected()">Delete</button>
      <button onclick="bringFront()">Bring Front</button>
      <button onclick="sendBack()">Send Back</button>

      <!-- STICKERS -->
      <button onclick="addSticker()">Add Sticker</button>

      <!-- EFFECTS -->
      <button onclick="instaColor()">Insta Color</button>
      <button onclick="addFrame()">Frame</button>
      <button onclick="resetImage()">Reset</button>

      <label>Brightness</label>
      <input type="range" min="0.5" max="2" step="0.1"
        value="1" oninput="setBrightness(this.value)">

      <button onclick="vintage()">Vintage</button>
      <button onclick="blurImg()">Blur</button>
      <button onclick="sharpen()">Sharpen</button>
      <button onclick="removeBackground()">AI Background</button>
      <button onclick="enhanceImage()">AI Enhance</button>

      <!-- HISTORY -->
      <button onclick="undoAction()">Undo</button>
      <button onclick="redoAction()">Redo</button>

      <!-- EXPORT -->
      <button onclick="exportHD()">Export HD</button>

      <!-- CROP -->
      <button onclick="activateCrop()">Crop Mode</button>
      <button onclick="applyCrop()">Apply Crop</button>
      <button onclick="cancelCrop()">Cancel Crop</button>

    </div>

  </div>

  <!-- FLOATING AI -->
  <div class="ai-assistant" id="aiAssistant">
    🤖 AI Assistant
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    AI Processing...
  </div>

  <script src="script.js"></script>

  </body>
        </html>
