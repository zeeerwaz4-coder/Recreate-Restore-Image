<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recreate and Restore</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- AI Greeting -->
  <div class="ai-greeting" id="aiGreeting">
    Welcome to Recreate and Restore.
    Upload an image and describe what you want to improve.
  </div>

  <!-- Header -->
  <header>

    <!-- Left Logo -->
    <div class="logo">
      RR
    </div>

    <!-- Center Title -->
    <h1>Recreate and Restore</h1>

  </header>

  <!-- Main Layout -->
  <div class="main-container">

    <!-- Center Area -->
    <div class="center-panel">

      <!-- Upload Box -->
      <div class="upload-box">
        <input type="file" id="imageUpload">
        <p>Upload or Drop Image Here</p>
         <canvas id="canvas"></canvas>
      </div>

      <!-- AI Request -->
      <textarea
        class="ai-request"
        placeholder="Describe what the AI should recreate or restore...">
      </textarea>

    </div>

    <!-- Right Tools -->
    <div class="tools-panel">
      <select id="stickerSelect">
  <option>🔥</option>
  <option>✨</option>
  <option>❤️</option>
  <option>😎</option>
  <option>🌟</option>
  <option>👑</option>
</select>
      <label>Object Size</label>

<input type="range"
min="20"
max="100"
value="40"
id="sizeSlider"
oninput="resizeObject(this.value)">

<button onclick="addSticker()">
  Add Sticker
</button>

  <button onclick="instaColor()">Insta Color</button>

  <label>Brightness</label>
  <input type="range" min="0.5" max="2" step="0.1" value="1"
         oninput="setBrightness(this.value)">

  <label>Frame</label>
  <button onclick="addFrame()">Add Frame</button>

  <button onclick="resetImage()">Reset</button>
  <button onclick="undo()">Undo</button>
  <button onclick="saveImage()">Save</button>
  <button onclick="vintage()">Vintage</button>
  <button onclick="blurImg()">Blur</button>
  <button onclick="sharpen()">Sharpen</button>
  <button onclick="removeBackground()">AI Background</button>
  <button onclick="enhanceImage()">AI Enhance</button>
  <input type="text" id="textInput"
placeholder="Enter text">

<button onclick="addText()">
  Add Text
</button>

    </div>

  </div>
  
  <!-- Floating AI Assistant -->
<div class="ai-assistant" id="aiAssistant">
  🤖 AI Assistant
</div>

<!-- Loading -->
<div class="loading" id="loading">
  AI Processing...
</div>

  <script src="script.js"></script>

</body>
    </html>
