<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recreate and Restore</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- AI Greeting -->
  <div class="ai-greeting" id="aiGreeting">
    Welcome to Recreate and Restore.
    Upload an image and describe what you want to improve.
  </div>

  <!-- Header -->
  <header>

    <!-- Left Logo -->
    <div class="logo">
      RR
    </div>

    <!-- Center Title -->
    <h1>Recreate and Restore</h1>

  </header>

  <!-- Main Layout -->
  <div class="main-container">

    <!-- Center Area -->
    <div class="center-panel">

      <!-- Upload Box -->
      <div class="upload-box">
        <input type="file" id="imageUpload">
        <p>Upload or Drop Image Here</p>
      </div>

      <!-- AI Request -->
      <textarea
        class="ai-request"
        placeholder="Describe what the AI should recreate or restore...">
      </textarea>

    </div>

    <!-- Right Tools -->
    <div class="tools-panel">

      <button>Insta Color</button>
      <button>Brightness</button>
      <button>Insta Frame</button>
      <button>Background</button>
      <button>Insta Trim</button>
      <button>Insta Cut</button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
    </html>
